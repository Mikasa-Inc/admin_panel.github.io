    <div class="container-fluid">

                    <small class="text-muted">Управление системой</small>
                </div>

                <ul class="nav flex-column flex-grow-1">
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link">📊 Дашборд</a>
                    </li>
                    <li class="nav-item">
                        <a href="users.html" class="nav-link">👥 Пользователи</a>

                </ul>

                <div class="sidebar-footer mt-auto">
                    <button id="toggle-btn" class="btn btn-outline-secondary w-100 mb-2 rounded-pill">
                        ☀️ Смена темы
                    </button>
                    <button id="logoutBtn" class="btn btn-outline-danger w-100 rounded-pill">
                        🚪 Выйти из системы
                    </button>
                </div>
            </nav>






            <main class="col-md-10 ms-sm-auto px-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">👥 Управление пользователями</h2>
                    <button class="btn btn-primary rounded-pill px-4" id="addUserBtn">
                        ➕ Добавить пользователя
                    </button>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Имя</th>
                                        <th>Email</th>
                                        <th>Роль</th>
                                        <th class="text-end">Действия</th>
                                    </tr>
                                </thead>
                                <tbody id="usersTableBody">
                                    <tr>
                                        <td colspan="5" class="text-center text-muted">Загрузка данных...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
