<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд | Админ-панель</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .sidebar {
            min-height: 100vh;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
        }

        .nav-link {
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            margin-bottom: 6px;
            font-size: 1.05rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .nav-link.active {
            font-weight: 600;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 1rem 0.5rem;
            border-top: 1px solid rgba(128, 128, 128, 0.2);
        }
    </style>
</head>

<body class="block-theme">
    <div class="container-fluid">
        <div class="row">


            <nav class="col-md-2 col-lg-2 sidebar p-3 d-flex flex-column">
                <div class="sidebar-header mb-4 px-2">
                    <h5 class="fw-bold text-primary mb-0">⚙️ Админ-панель</h5>
                    <small class="text-muted">Управление системой</small>
                </div>

                <ul class="nav flex-column flex-grow-1">
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link">📊 Дашборд</a>
                    </li>
                    <li class="nav-item">
                        <a href="users.html" class="nav-link">👥 Пользователи</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html" class="nav-link">📦 Товары</a>
                    </li>
                    <li class="nav-item">
                        <a href="orders.html" class="nav-link">🛒 Заказы</a>
                    </li>
                </ul>

                <div class="sidebar-footer mt-auto">
                    <button id="toggle-btn" class="btn btn-outline-secondary w-100 mb-2 rounded-pill">
                        ☀️ Смена темы
                    </button>
                    <button id="logoutBtn" class="btn btn-outline-danger w-100 rounded-pill">
                        🚪 Выйти из системы
                    </button>
                </div>
            </nav>



            <main class="col-md-10 ms-sm-auto px-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">📊 Дашборд</h2>
                </div>



                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <div class="card stat-card p-3 border-start border-primary border-4">
                            <small class="text-muted">Пользователи</small>
                            <h4 class="fw-bold mb-0" id="userCount">-</h4>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card p-3 border-start border-success border-4">
                            <small class="text-muted">Товары</small>
                            <h4 class="fw-bold mb-0" id="productCount">-</h4>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card p-3 border-start border-warning border-4">
                            <small class="text-muted">Заказы</small>
                            <h4 class="fw-bold mb-0" id="orderCount">-</h4>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card p-3 border-start border-info border-4">
                            <small class="text-muted">Доход</small>
                            <h4 class="fw-bold mb-0" id="revenue">-</h4>
                        </div>
                    </div>
                </div>



                <div class="card">
                    <div class="card-header bg-transparent">
                        <h5 class="card-title mb-0">🕐 Последние заказы</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th>ID заказа</th>
                                        <th>Клиент</th>
                                        <th>Сумма</th>
                                        <th>Статус</th>
                                    </tr>
                                </thead>
                                <tbody id="recentOrders">
                                    <tr>
                                        <td colspan="4" class="text-center text-muted">Загрузка данных...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
