<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель | Авторизация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link id="theme-css" rel="stylesheet" href="css/light-theme.css">
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
        }
        .login-card { 
            max-width: 420px; 
            margin-top: 10vh; 
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center block-theme" style="min-height: 100vh;">
    <div class="login-card w-100">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span></span>
                    <button id="toggle-btn" class="btn btn-sm btn-outline-secondary rounded-pill px-3">
                        ☀️ Смена темы
                    </button>
                </div>
                
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-primary">Админ-панель</h3>
                    <p class="text-muted">Войдите в свою учётную запись</p>
                </div>
                
                <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="admin@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Войти</button>
                </form>
                
                <div class="text-center mt-3 text-muted small">
                    <p class="mb-0"><strong>admin@example.com</strong> / <strong>admin123</strong></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
